# Test Database Configuration - H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop  # Let Hibernate create schema
spring.jpa.show-sql=false  # Too verbose
spring.jpa.properties.hibernate.format_sql=true

# CRITICAL: Disable Flyway for tests!
spring.flyway.enabled=false

# JWT test config
jwt.secret=test-secret-key-for-testing-purposes-only-min-256-bits-long
jwt.expiration=3600000

# Logging
logging.level.com.lockin=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Disable external services in tests
google.calendar.enabled=false
anthropic.api.enabled=false

# WebSocket disabled for unit tests
spring.websocket.enabled=false
